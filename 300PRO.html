<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VhyDheavy Creator Suite-Slide Generator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy-glow: linear-gradient(135deg, #1d4d2b, #2d6a4f, #1b4332);
            --gold: #ffdd44;
            --gold-glow: 0 0 12px rgba(255, 221, 68, 0.7);
            --koala-grey: #a8a8a8;
            --soft-yellow: #fff3b0;
        }
        
        * {
            box-shadow: border-box;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #2d6a4f;
            overflow: hidden;
            position: relative;
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #40916c, #1b4332);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .login-card {
            background-color: #ffffff;
            border: 4px dashed #ffdd44;
            border-radius: 35px;
            width: 100%;
            max-width: 380px;
            padding: 45px 22px;
            text-align: center;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .icon-header {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            line-height: 1;
        }

        .crown-icon { font-size: 50px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15)); }
        .sparkle-icon { font-size: 40px; }

        .title {
            color: #1b4332;
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-shadow: 1px 1px 0px #ffdd44;
        }

        .subtitle {
            color: #40916c;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 35px;
            background: #fff3b0;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        /* PASSWORD CONTAINER */
        .password-container {
            position: relative;
            width: 100%;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            background-color: #f4f9f4;
            border: 3px solid #74c69d;
            border-radius: 50px;
            padding: 2px 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .password-container input {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            color: #1b4332;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 0;
            letter-spacing: 1.5px;
        }

        .password-container input::placeholder {
            color: #95d5b2;
            letter-spacing: 0px;
        }

        .btn-see-password {
            background: none;
            border: none;
            color: #2d6a4f;
            font-size: 13px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding-left: 10px;
            white-space: nowrap;
            outline: none;
            user-select: none;
            text-transform: uppercase;
        }

        /* BUTTONS */
        .btn-submit {
            width: 100%;
            background: linear-gradient(to bottom, #ffdd44, #ffb703);
            border: 2px solid #1b4332;
            border-radius: 50px;
            color: #1b4332;
            font-size: 15px;
            font-weight: 900;
            padding: 15px;
            cursor: pointer;
            box-shadow: 0 6px 0px #1b4332;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            outline: none;
            transition: all 0.1s ease;
        }
        
        .btn-submit:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #1b4332;
        }

        .error-msg {
            color: #d90429;
            font-size: 12px;
            margin-top: 16px;
            display: none;
            font-weight: 700;
            background: #ffe3e3;
            padding: 6px;
            border-radius: 10px;
            border: 1px solid #d90429;
        }

        /* OPTION SELECTOR */
        .option-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-option {
            width: 100%;
            background: #ffffff;
            border: 3px solid #74c69d;
            border-radius: 25px;
            color: #1b4332;
            font-size: 14px;
            font-weight: 700;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-option:hover {
            background: #fff3b0;
            border-color: #ffdd44;
        }

        /* SUPER COMPACT SINGLE-ROW MENU BAR */
        .menu-bar {
            background: linear-gradient(135deg, #1b4332, #2d6a4f);
            border-bottom: 3px solid #ffdd44;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            padding: 3px 4px;
            display: flex;
            align-items: stretch;
            justify-content: flex-start;
            gap: 3px;
            position: relative;
            z-index: 1000;
            width: 100%;
        }

        /* Ultra Compact Back Button */
        .btn-back-to-options {
            flex: 0 0 auto;
            background: #ffb703;
            color: #1b4332;
            font-size: 7.5px;
            font-weight: 900;
            padding: 4px 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1.5px solid #1b4332;
            text-transform: uppercase;
            box-shadow: 0 1.5px 0px #1b4332;
        }

        .btn-back-to-options:active {
            transform: translateY(1px);
            box-shadow: 0 0.5px 0px #1b4332;
        }

        /* Dynamic Row Container */
        .menu-row-container {
            display: flex;
            gap: 3px;
            width: 100%;
            align-items: stretch;
        }

        /* Auto-Sizing Micro Items */
        .menu-item {
            flex: 1 1 0%; /* Forces all items to share available space equally */
            min-width: 0; /* Allows text wrapping inside without overflowing */
            padding: 4px 2px;
            color: #ffffff;
            opacity: 0.85;
            font-family: 'Poppins', sans-serif;
            font-size: 7px; /* Micro font size to fit everything perfectly */
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 4px;
            line-height: 1.1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.1);
            white-space: normal;
            word-break: break-word;
        }

        @media (min-width: 380px) {
            .menu-item { font-size: 7.5px; padding: 4px 3px; }
            .btn-back-to-options { font-size: 8px; padding: 4px 6px; }
            .menu-bar { padding: 4px; gap: 4px; }
            .menu-row-container { gap: 4px; }
        }

        @media (min-width: 480px) {
            .menu-item { font-size: 9px; padding: 6px; }
            .btn-back-to-options { font-size: 10px; padding: 6px 10px; }
        }

        .menu-item:hover {
            opacity: 1;
            background: rgba(255, 221, 68, 0.1);
        }

        .menu-item.active {
            opacity: 1;
            color: #1b4332;
            background: #ffdd44;
            box-shadow: 0 1.5px 0px #1b4332;
            font-weight: 900;
            transform: translateY(-0.5px);
            border-color: transparent;
        }

        /* WORKSPACE */
        .workspace-container {
            width: 100%;
            height: calc(100% - 35px); /* Menyesuaikan tinggi dengan menu bar */
            position: relative;
            background: #1b4332;
        }

        .app-iframe-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            border: none;
        }

        .app-iframe-wrapper.active {
            display: block;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            background: #ffffff;
        }
    </style>
</head>

            ]

        const loadedIframes = {};

        function togglePasswordVisibility() {
            const pwdInput = document.getElementById('password-input');
            const toggleBtn = document.getElementById('togglePassword');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                toggleBtn.innerHTML = 'TUTUP 🙈';
            } else {
                pwdInput.type = 'password';
                toggleBtn.innerHTML = 'LIHAT 👁️';
            }
        }

        function checkPassword() {
            const pin = document.getElementById('password-input').value;
            if (pin === "11") {
                document.getElementById('credentials-area').style.display = 'none';
                document.getElementById('options-area').style.display = 'flex';
            } else {
                const err = document.getElementById('error-message');
                err.style.display = 'block';
                document.getElementById('password-input').value = "";
                document.getElementById('password-input').focus();
            }
        }

        function selectVersion(version) {
            const menuRow = document.getElementById('dynamic-menu-row');
            let menuHTML = '';
            const currentApps = appConfig[version];

            currentApps.forEach((app, index) => {
                const activeClass = index === 0 ? 'active' : '';
                menuHTML += `<div class="menu-item ${activeClass}" data-tab="${app.tabId}" onclick="switchTab(${app.tabId}, this)">${app.name}</div>`;
            });

            menuRow.innerHTML = menuHTML;

            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            
            if (currentApps.length > 0) {
                switchTab(currentApps[0].tabId);
            }
        }

        function switchTab(tabId, element) {
            if (element) {
                const items = document.querySelectorAll('.menu-item');
                items.forEach(item => item.classList.remove('active'));
                element.classList.add('active');
            }

            const wrappers = document.querySelectorAll('.app-iframe-wrapper');
            wrappers.forEach(wrapper => wrapper.classList.remove('active'));

            const targetWrapper = document.getElementById(`tab-${tabId}`);
            if (targetWrapper) {
                targetWrapper.classList.add('active');
            }

            if (!loadedIframes[tabId]) {
                const iframe = document.getElementById(`iframe-${tabId}`);
                if (iframe) {
                    let app = appConfig.utama.find(a => a.tabId === tabId);
                    if (!app) app = appConfig.iphone.find(a => a.tabId === tabId);
                    if (app) {
                        iframe.srcdoc = app.content;
                        loadedIframes[tabId] = true;
                    }
                }
            }
        }

        function goBackToOptions() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('login-overlay').style.display = 'flex';
            document.getElementById('credentials-area').style.display = 'none';
            document.getElementById('options-area').style.display = 'flex';
        }

        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
